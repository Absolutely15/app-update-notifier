name: Check App Updates

on:
  schedule:
    - cron: "0 * * * *" # chạy mỗi giờ (UTC)
  workflow_dispatch: # cho phép bấm nút "Run workflow" thủ công

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install google-play-scraper requests

      - name: Run script
        run: python main.py
