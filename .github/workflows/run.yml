name: Check App Updates

on:
  schedule:
    - cron: "0 1 * * *" # chạy 09:00 hàng ngày (Asia/Ho_Chi_Minh)
  workflow_dispatch: # cho phép bấm nút "Run workflow" thủ công

jobs:
  build:
    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      APPS_SHEET_URL: ${{ vars.APPS_SHEET_URL }}
      PUBLISHERS_SHEET_URL: ${{ vars.PUBLISHERS_SHEET_URL }}
      DISCORD_CHANNEL_SHEET_URL: ${{ vars.DISCORD_CHANNEL_SHEET_URL }}
      DISCORD_ROLE_SHEET_URL: ${{ vars.DISCORD_ROLE_SHEET_URL }}
    runs-on: ubuntu-latest
    permissions:
      actions: write # Cho phép job này quản lý cache
      contents: read # Quyền đọc repo (mặc định)

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Restore app state
        uses: actions/cache@v4
        with:
          path: last_versions.json
          key: app-versions-${{ github.run_number }}
          restore-keys: |
            app-versions-

      - name: Restore publishers state
        uses: actions/cache@v4
        with:
          path: publishers_state.json
          key: publishers-${{ github.run_number }}
          restore-keys: |
            publishers-

      - name: Watch publishers (new apps)
        run: npm run watch:publishers

      - name: Check app updates
        run: npm run check:apps

      - name: Show current time (UTC & VN)
        run: |
          echo "⏰ Current UTC time: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "⏰ Current VN time : $(TZ=Asia/Ho_Chi_Minh date '+%Y-%m-%d %H:%M:%S')"

      - name: Show state file
        run: |
          echo "===== last_versions.json ====="
          cat last_versions.json || echo "⚠️ File không tồn tại"
          echo "===== publishers_state.json ====="
          cat publishers_state.json || echo "⚠️ File không tồn tại"

      - name: Save app state
        uses: actions/cache/save@v4
        with:
          path: last_versions.json
          key: app-versions-${{ github.run_number }}

      - name: Save publishers state
        uses: actions/cache/save@v4
        with:
          path: publishers_state.json
          key: publishers-${{ github.run_number }}

      - name: Cleanup old caches
        run: |
          echo "🔄 Cleaning up old caches..."
          for PREFIX in app-versions- publishers-; do
            echo "→ Prefix: $PREFIX"
            gh api --method GET repos/${{ github.repository }}/actions/caches -F key=$PREFIX \
            | jq -r '
                .actions_caches
                | sort_by(.last_accessed_at)        # sắp xếp cũ → mới
                | reverse                           # mới → cũ
                | .[2:]                             # giữ lại 2 cache mới nhất, còn lại xoá
                | .[].id
              ' \
            | xargs -I{} gh api --method DELETE repos/${{ github.repository }}/actions/caches/{} || true
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
